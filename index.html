<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Legislation Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f1eb;
    --surface: #fffefa;
    --ink: #1a1a18;
    --ink2: #5a5a54;
    --ink3: #9a9a90;
    --accent: #2d5a3d;
    --accent-light: #b5cebe;
    --accent2: #c8502a;
    --border: rgba(26,26,24,0.12);
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header {
    padding: 0.9rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; gap: 1rem;
    flex-shrink: 0;
  }
  header h1 { font-size: 1rem; font-weight: 500; letter-spacing: -0.01em; }
  header .pill {
    font-family: var(--mono); font-size: 0.62rem; color: var(--ink3);
    background: var(--bg); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 2px;
  }

  .layout { display: grid; grid-template-columns: 1fr 340px; flex: 1; min-height: 0; }

  /* LEFT PANEL */
  .left { display: flex; flex-direction: column; overflow: hidden; padding: 1rem 1rem 0.5rem 1.5rem; gap: 0.75rem; }

  .filters { display: flex; flex-wrap: wrap; gap: 5px; flex-shrink: 0; }
  .year-filters { border-top: 1px solid var(--border); padding-top: 5px; margin-top: 5px; }
  .filter-btn {
    font-family: var(--mono); font-size: 0.62rem; padding: 4px 10px; border-radius: 2px;
    border: 1px solid var(--border); background: var(--surface); color: var(--ink2);
    cursor: pointer; transition: all 0.15s; white-space: nowrap; letter-spacing: 0.02em;
    line-height: 1;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-btn.all-btn.active { background: var(--ink); border-color: var(--ink); }
  .year-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  #map-container { flex: 1; min-height: 0; position: relative; }
  #map-container svg { width: 100%; height: 100%; }

  .state-path {
    fill: #ddd9d0;
    stroke: var(--bg);
    stroke-width: 1px;
    cursor: default;
    transition: fill 0.2s;
  }
  .state-path.has-laws { fill: var(--accent-light); cursor: pointer; }
  .state-path.highlighted { fill: var(--accent); cursor: pointer; }
  .state-path.has-laws:hover { fill: #8fb8a8; }
  .state-path.highlighted:hover { fill: #1e4029; }

  .state-label {
    font-family: var(--mono); font-size: 7px; fill: var(--ink);
    pointer-events: none; text-anchor: middle; dominant-baseline: middle;
  }
  .state-label.on-dark { fill: #fff; }

  /* TOOLTIP */
  #tooltip {
    position: absolute; pointer-events: none; opacity: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 10px; font-size: 0.7rem;
    font-family: var(--mono); color: var(--ink2); transition: opacity 0.1s;
    white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  /* RIGHT PANEL */
  .sidebar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; background: var(--border);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stat { background: var(--surface); padding: 0.9rem 1rem; }
  .stat-label { font-family: var(--mono); font-size: 0.58rem; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .stat-val { font-size: 1.5rem; font-weight: 300; letter-spacing: -0.03em; line-height: 1; }
  .stat-val.sm { font-size: 0.85rem; font-weight: 400; padding-top: 3px; line-height: 1.3; }
  .stat-sub { font-family: var(--mono); font-size: 0.58rem; color: var(--ink3); margin-top: 3px; }

  .category-chart {
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 130px;
    padding: 0.8rem 0;
    background: var(--surface);
  }
  .category-chart svg { display: block; width: 100%; }
  .category-chart text { font-family: var(--mono); font-size: 0.56rem; }
  .category-chart .bar { fill: var(--accent); transition: fill 0.2s; }
  .category-chart .bar:hover { fill: var(--accent-light); cursor: pointer; }
  .category-chart .label-y { fill: var(--ink2); text-anchor: end; }
  .category-chart .label-x { fill: var(--ink3); }

  .bills-header {
    padding: 0.65rem 1rem;
    font-family: var(--mono); font-size: 0.62rem; color: var(--ink3);
    text-transform: uppercase; letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .bills-list { flex: 1; overflow-y: auto; }
  .bills-list::-webkit-scrollbar { width: 4px; }
  .bills-list::-webkit-scrollbar-track { background: transparent; }
  .bills-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .bill-card { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .bill-card:hover { background: var(--bg); }
  .bill-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; margin-bottom: 3px; }
  .bill-state { font-family: var(--mono); font-size: 0.6rem; color: var(--accent2); font-weight: 500; }
  .bill-num { font-family: var(--mono); font-size: 0.56rem; color: var(--ink3); }
  .bill-title { font-size: 0.76rem; font-weight: 500; color: var(--ink); line-height: 1.4; margin-bottom: 4px; }
  .bill-summary { font-size: 0.68rem; color: var(--ink2); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .bill-cat { display: inline-block; font-family: var(--mono); font-size: 0.54rem; padding: 2px 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 2px; color: var(--ink3); margin-top: 5px; }
  .empty { padding: 2rem 1rem; font-family: var(--mono); font-size: 0.7rem; color: var(--ink3); text-align: center; }
  .loading { padding: 2rem 1rem; font-family: var(--mono); font-size: 0.7rem; color: var(--ink3); text-align: center; }
</style>
</head>
<body>

<header>
  <h1>AI Legislation Tracker</h1>
  <span class="pill">236 laws · 12+ states · ongoing</span>

<div class="layout">
  <div class="left">
    <div class="filters" id="filters"></div>
    <div id="map-container">
      <div id="tooltip"></div>

  <div class="sidebar">
    <div class="stats-grid" id="stats"></div>
    <div id="category-chart" class="category-chart"></div>
    <div class="bills-header" id="bills-header">All laws · 236</div>
    <div class="bills-list" id="bills-list"><div class="loading">Loading...</div></div>
  </div>
</div>

  {state:"New York",bill:"S 8024",title:"AI in Insurance Modeling Study",year:2025,category:"Insurance",summary:"Requires a study of AI and machine-learning models in insurance pricing and claims, focusing on fairness and transparency."},
  {state:"Utah",bill:"HB 501",title:"AI Deepfake Harms Act",year:2025,category:"Deepfakes & Synthetic Media",summary:"Creates civil remedies and certain criminal penalties for malicious use of deepfake media that causes reputational, economic, or emotional harm."},
  {state:"Texas",bill:"HB 4103",title:"AI in Law Enforcement Technology Standards",year:2025,category:"Law Enforcement",summary:"Directs the development of standards for AI-based law-enforcement technologies, including testing, auditability, and protections against discriminatory deployment."},
];

const FIPS_TO_NAME = {
  "01":"Alabama","02":"Alaska","04":"Arizona","05":"Arkansas","06":"California",
  "08":"Colorado","09":"Connecticut","10":"Delaware","12":"Florida","13":"Georgia",
  "15":"Hawaii","16":"Idaho","17":"Illinois","18":"Indiana","19":"Iowa",
  "20":"Kansas","21":"Kentucky","22":"Louisiana","23":"Maine","24":"Maryland",
  "25":"Massachusetts","26":"Michigan","27":"Minnesota","28":"Mississippi","29":"Missouri",
  "30":"Montana","31":"Nebraska","32":"Nevada","33":"New Hampshire","34":"New Jersey",
  "35":"New Mexico","36":"New York","37":"North Carolina","38":"North Dakota","39":"Ohio",
  "40":"Oklahoma","41":"Oregon","42":"Pennsylvania","44":"Rhode Island","45":"South Carolina",
  "46":"South Dakota","47":"Tennessee","48":"Texas","49":"Utah","50":"Vermont",
  "51":"Virginia","53":"Washington","54":"West Virginia","55":"Wisconsin","56":"Wyoming"
};

const CATEGORIES = [...new Set(DATA.map(d => d.category))].sort();
const YEARS = [...new Set(DATA.map(d => d.year))].sort().reverse();
let activeCategories = [];
let activeState = null;
let activeYear = null;

function getFiltered() {
  let result = DATA;
  if (activeCategories.length > 0) {
    result = result.filter(d => activeCategories.includes(d.category));
  }
  if (activeYear) {
    result = result.filter(d => d.year === activeYear);
  }
  if (activeState) {
    result = result.filter(d => d.state === activeState);
  }
  return result;
}

// Build filter buttons
const filtersEl = document.getElementById('filters');
const allBtn = document.createElement('button');
allBtn.className = 'filter-btn all-btn active';
allBtn.textContent = 'All';
allBtn.onclick = () => { activeCategories = []; activeState = null; activeYear = null; update(); };
filtersEl.appendChild(allBtn);
CATEGORIES.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.cat = cat;
  btn.textContent = cat;
  btn.onclick = () => {
    const idx = activeCategories.indexOf(cat);
    if (idx > -1) {
      activeCategories.splice(idx, 1);
    } else {
      activeCategories.push(cat);
    }
    update();
  };
  filtersEl.appendChild(btn);
});

// Add year buttons as a new row
const yearRowDiv = document.createElement('div');
yearRowDiv.className = 'filters year-filters';
yearRowDiv.id = 'year-filters';
YEARS.forEach(year => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn year-btn';
  btn.dataset.year = year;
  btn.textContent = year;
  btn.onclick = () => {
    activeYear = (activeYear === year) ? null : year;
    update();
  };
  yearRowDiv.appendChild(btn);
});
filtersEl.parentNode.insertBefore(yearRowDiv, filtersEl.nextSibling);

// Build map with D3
const container = document.getElementById('map-container');
const tooltip = document.getElementById('tooltip');
const width = container.clientWidth || 700;
const height = container.clientHeight || 400;

const svg = d3.select('#map-container').append('svg')
  .attr('width', '100%').attr('height', '100%')
  .attr('viewBox', `0 0 960 600`);

const projection = d3.geoAlbersUsa().scale(1280).translate([480, 300]);
const path = d3.geoPath().projection(projection);

let stateFeatures = [];

fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
  .then(r => r.json())
  .then(us => {
    stateFeatures = topojson.feature(us, us.objects.states).features;
    stateFeatures.forEach(f => {
      const name = FIPS_TO_NAME[f.id.toString().padStart(2,'0')] || '';
      f.properties.name = name;
    });

    svg.selectAll('.state-path')
      .data(stateFeatures)
      .enter().append('path')
      .attr('class', 'state-path')
      .attr('d', path)
      .attr('data-state', d => d.properties.name)
      .on('mousemove', function(event, d) {
        const name = d.properties.name;
        const count = DATA.filter(x => x.state === name).length;
        if (!count) return;
        const filtered = getFiltered().filter(x => x.state === name).length;
        tooltip.style.opacity = '1';
        tooltip.style.left = (event.offsetX + 12) + 'px';
        tooltip.style.top = (event.offsetY - 10) + 'px';
        tooltip.textContent = `${name} · ${filtered} law${filtered !== 1 ? 's' : ''}${activeCategories.length > 0 ? ' in category' : ''}`;
      })
      .on('mouseleave', () => { tooltip.style.opacity = '0'; })
      .on('click', function(event, d) {
        const name = d.properties.name;
        const count = DATA.filter(x => x.state === name).length;
        if (!count) return;
        if (activeState === name) {
          activeState = null;
        } else {
          activeState = name;
        }
        update();
      });

    // State name labels
    stateFeatures.forEach(f => {
      const name = f.properties.name;
      const centroid = path.centroid(f);
      if (!centroid || isNaN(centroid[0])) return;
      // Skip tiny states
      if (['Rhode Island','Connecticut','Delaware','New Hampshire','Vermont','Massachusetts','New Jersey','Maryland','Hawaii'].includes(name)) return;
      svg.append('text')
        .attr('class', 'state-label')
        .attr('x', centroid[0])
        .attr('y', centroid[1])
        .text(name.length > 10 ? abbreviate(name) : name);
    });

    const initialFiltered = getFiltered();
    updateMap(initialFiltered);
    updateBills(initialFiltered);
    updateStats(initialFiltered);
    updateCategoryChart(initialFiltered);
  });

function abbreviate(name) {
  const abbrs = {
    "North Dakota":"N. Dakota","South Dakota":"S. Dakota","North Carolina":"N. Carolina",
    "South Carolina":"S. Carolina","West Virginia":"W. Virginia","New Mexico":"New Mexico",
    "New Hampshire":"N. Hampshire","Rhode Island":"R. Island","Massachusetts":"Mass.",
    "Connecticut":"Conn.","Mississippi":"Miss.","Pennsylvania":"Penn.","Minnesota":"Minn.",
    "California":"Calif.","Washington":"Wash.","Tennessee":"Tenn.","Louisiana":"La.",
    "Wisconsin":"Wisc.","Nebraska":"Nebr.","Oklahoma":"Okla.","Arkansas":"Ark.",
    "Missouri":"Mo.","Kentucky":"Ky.","Michigan":"Mich."
  };
  return abbrs[name] || name;
}

function updateMap(filtered) {
  const activeStates = new Set(filtered.map(d => d.state));
  const allStates = new Set(DATA.map(d => d.state));
  svg.selectAll('.state-path').each(function(d) {
    const name = d.properties.name;
    const el = d3.select(this);
    el.classed('has-laws', false).classed('highlighted', false);
    if (activeState || activeCategories.length > 0) {
      if (activeStates.has(name)) el.classed('highlighted', true);
      else if (allStates.has(name)) el.classed('has-laws', true);
    } else {
      if (allStates.has(name)) el.classed('has-laws', true);
    }
  });
}

function updateStats(filtered) {
  const stateCounts = {};
  filtered.forEach(d => { stateCounts[d.state] = (stateCounts[d.state]||0)+1; });
  const statesActive = Object.keys(stateCounts).length;
  let topState = '-', topCount = 0;
  Object.entries(stateCounts).forEach(([s,c]) => { if(c>topCount){topCount=c;topState=s;} });
  const catCounts = {};
  DATA.forEach(d => { catCounts[d.category] = (catCounts[d.category]||0)+1; });
  let topCat = '-', topCatN = 0;
  Object.entries(catCounts).forEach(([c,n]) => { if(n>topCatN){topCatN=n;topCat=c;} });

  let filterLabel = 'all categories';
  if (activeCategories.length > 0) {
    filterLabel = activeCategories.length + ' categor' + (activeCategories.length === 1 ? 'y' : 'ies');
  }
  if (activeState) {
    filterLabel = activeState;
  }

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Total laws</div><div class="stat-val">${filtered.length}</div><div class="stat-sub">${filterLabel}</div></div>
    <div class="stat"><div class="stat-label">States active</div><div class="stat-val">${statesActive}</div><div class="stat-sub">${activeState ? 'filtered to ' + activeState : 'all'}</div></div>
    <div class="stat"><div class="stat-label">Most active state</div><div class="stat-val sm">${topState}</div><div class="stat-sub">${topCount} law${topCount!==1?'s':''}</div></div>
    <div class="stat"><div class="stat-label">Top category</div><div class="stat-val sm">${topCat}</div><div class="stat-sub">${topCatN} laws overall</div></div>
  `;
}

function updateBills(filtered) {
  let headerText = 'All laws';
  if (activeState) {
    headerText = activeState + ' laws';
  } else if (activeCategories.length > 0) {
    headerText = activeCategories.length === 1 ? activeCategories[0] : activeCategories.length + ' categories';
  }
  if (activeYear) {
    headerText += ' · ' + activeYear;
  }
  document.getElementById('bills-header').textContent = headerText + ' · ' + filtered.length;
  const list = document.getElementById('bills-list');
  if (!filtered.length) { list.innerHTML = '<div class="empty">No laws found.</div>'; return; }
  list.innerHTML = filtered.map(d => `
    <div class="bill-card">
      <div class="bill-top">
        <span class="bill-state">${d.state}</span>
        <span class="bill-num">${d.bill} · ${d.year}</span>
      </div>
      <div class="bill-title">${d.title}</div>
      <div class="bill-summary">${d.summary}</div>
      <span class="bill-cat">${d.category}</span>
    </div>
  `).join('');
}

function getCategoryStats(filtered) {
  const stats = {};
  CATEGORIES.forEach(cat => {
    stats[cat] = filtered.filter(d => d.category === cat).length;
  });
  return stats;
}

function updateCategoryChart(filtered) {
  const stats = getCategoryStats(filtered);
  const chartDiv = document.getElementById('category-chart');
  const width = chartDiv.clientWidth || 340;
  const height = 130;
  const margin = { top: 8, right: 15, bottom: 8, left: 115 };
  const innerWidth = width - margin.left - margin.right;
  const innerHeight = height - margin.top - margin.bottom;

  const maxCount = Math.max(...Object.values(stats), 1);
  const scale = d3.scaleLinear().domain([0, maxCount]).range([0, innerWidth]);

  const sortedCats = Object.entries(stats).sort((a, b) => b[1] - a[1]);
  const barHeight = Math.max(10, innerHeight / CATEGORIES.length);

  let svg = d3.select('#category-chart svg');
  if (svg.empty()) {
    svg = d3.select('#category-chart').append('svg')
      .attr('width', '100%')
      .attr('height', height);
  }
  svg.selectAll('*').remove();

  const g = svg.append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

  const bars = g.selectAll('.bar-group')
    .data(sortedCats)
    .enter().append('g')
    .attr('class', 'bar-group')
    .attr('transform', (d, i) => `translate(0,${i * barHeight})`);

  bars.append('rect')
    .attr('class', 'bar')
    .attr('width', d => scale(d[1]))
    .attr('height', barHeight - 2)
    .attr('y', 1);

  bars.append('text')
    .attr('class', 'label-y')
    .attr('x', -8)
    .attr('y', barHeight / 2)
    .attr('dominant-baseline', 'middle')
    .text(d => d[0].substring(0, 13));

  bars.append('text')
    .attr('class', 'label-x')
    .attr('x', d => scale(d[1]) + 3)
    .attr('y', barHeight / 2)
    .attr('dominant-baseline', 'middle')
    .text(d => d[1] || '');
}

function update() {
  const filtered = getFiltered();
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const cat = btn.dataset.cat;
    const year = btn.dataset.year;
    if (!cat && !year) {
      // All button
      btn.classList.toggle('active', activeCategories.length === 0 && !activeState && !activeYear);
    } else if (cat) {
      // Category button
      btn.classList.toggle('active', activeCategories.includes(cat));
    } else if (year) {
      // Year button
      btn.classList.toggle('active', activeYear == year);
    }
  });
  updateMap(filtered);
  updateStats(filtered);
  updateBills(filtered);
  updateCategoryChart(filtered);
}
</script>
</body>
</html>
