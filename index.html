<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Slate County Report Card - California</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Clean Slate County Report Card</h1>
            <p class="subtitle">Tracking Automatic Record Relief Implementation in California</p>
        </header>

        <!-- Subtabs Navigation -->
        <div class="subtabs-container">
            <div class="subtabs-navigation">
                <button class="subtab-btn active" data-subtab="overview">Overview</button>
                <button class="subtab-btn" data-subtab="search">Search County</button>
                <button class="subtab-btn" data-subtab="rankings">All Rankings</button>
            </div>

            <!-- Overview Subtab -->
            <div id="overviewSubtab" class="subtab-content active">
                <div id="homeContent"></div>
            </div>

            <!-- Search County Subtab -->
            <div id="searchSubtab" class="subtab-content">
                <div class="search-section">
                    <input
                        type="text"
                        id="countySearch"
                        class="search-input"
                        placeholder="Search for a county..."
                        autocomplete="off"
                    >
                    <div id="suggestions" class="suggestions"></div>
                </div>

                <div id="cardContainer" class="card-container">
                    <div class="empty-state">
                        <p>Search for a county to view its report card</p>
                    </div>
                </div>
            </div>

            <!-- All Rankings Subtab -->
            <div id="rankingsSubtab" class="subtab-content">
                <div class="rankings-controls">
                    <label for="sortBy">Sort by:</label>
                    <select id="sortBy">
                        <option value="rank_clearance">Clearance Rate (Best to Worst)</option>
                        <option value="clearance_rate_desc">Clearance Rate (%)</option>
                        <option value="disposition_gap">Disposition Gap (Lowest to Highest)</option>
                        <option value="total_records_cleared">Records Cleared (Most to Least)</option>
                    </select>
                </div>
                <div id="rankingsTable" class="rankings-table-container"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
